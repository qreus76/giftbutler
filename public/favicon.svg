<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg  { fill: #fbbf24; }
    .fg  { fill: #ffffff; }
    .cut { fill: #fbbf24; }
    @media (prefers-color-scheme: dark) {
      .bg  { fill: #1c1917; }
      .fg  { fill: #fbbf24; }
      .cut { fill: #1c1917; }
    }
  </style>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" class="bg"/>

  <!-- Box lid -->
  <rect x="14" y="44" width="72" height="14" rx="3" class="fg"/>

  <!-- Box body -->
  <rect x="18" y="58" width="64" height="26" rx="3" class="fg"/>

  <!-- Ribbon cutout — vertical -->
  <rect x="44" y="44" width="12" height="40" class="cut"/>

  <!-- Ribbon cutout — horizontal across lid -->
  <rect x="14" y="49" width="72" height="4" class="cut"/>

  <!-- Bow — left loop -->
  <path d="M50,44 C48,34 22,24 26,35 C30,44 48,44 50,44Z" class="fg"/>

  <!-- Bow — right loop -->
  <path d="M50,44 C52,34 78,24 74,35 C70,44 52,44 50,44Z" class="fg"/>

  <!-- Bow — center knot -->
  <circle cx="50" cy="43" r="5" class="fg"/>
</svg>
